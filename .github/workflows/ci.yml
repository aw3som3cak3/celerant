name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # better-sqlite3 v12 ships a linux-x64 prebuilt binary for this Node, so
      # `npm ci` installs without a compile step.
      - name: Install
        run: npm ci

      - name: Test (vitest — verify, replay equality, firewall, map, evidence, icons)
        run: npm test

      - name: Build (typecheck + production build)
        run: npm run build

  deploy:
    # Only deploy from main, and only if build + tests pass. PRs never deploy.
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.ref }} # never two deploys at once
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
